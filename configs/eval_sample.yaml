paths:
  input_documents:
    - data/sample/contracts.jsonl
  eval_examples: data/sample/eval_examples.jsonl
  output_dir: artifacts

chunking:
  policy: structure_aware_v2
  chunk_size: 128
  overlap: 32
  max_size: 256

retrieval:
  retriever_model: BAAI/bge-m3
  reranker_model: BAAI/bge-reranker-v2-m3
  retrieval_mode: hybrid_rrf
  use_elasticsearch: true
  es_url: http://localhost:9200
  es_index_name: legal_contract_rag_sample
  dense_top_k: 10
  sparse_top_k: 10
  top_k_recall: 10
  top_k_rerank: 5
  rerank_threshold: 0.0

evaluation:
  include_answer_eval: false

generation:
  model_name: null
  max_new_tokens: 128
  temperature: 0.0
  context_chunks: 5
  fallback_sentence_count: 2

graph:
  max_retry: 1

query_analysis:
  enable_variants: true
  max_variants: 3

routing:
  min_rerank_score: 0.2
  min_must_term_coverage: 0.4
  min_returned_docs: 2
  min_top1_margin_over_top5_mean: 0.02
